#Voice distance settings
[voice_distance]
	#Distance for whisper mode
	# Default: 4.0
	# Range: 1.0 ~ 48.0
	whisperDistance = 4.0
	#Distance for normal mode
	# Default: 15.0
	# Range: 1.0 ~ 48.0
	normalDistance = 15.0
	#Distance for call mode
	# Default: 30.0
	# Range: 1.0 ~ 48.0
	callDistance = 30.0
	#Distance for shout mode
	# Default: 48.0
	# Range: 1.0 ~ 48.0
	shoutDistance = 48.0
	#Cooldown duration in seconds for cycling voice distance mode
	# Default: 1
	# Range: 0 ~ 60
	cooldownSeconds = 1
	#Show welcome message on client login
	showWelcomeMessage = true
	showChatPrefix = true
